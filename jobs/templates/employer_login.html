<!DOCTYPE html>
<html>
<head>
    <title>JOBNEST - Employer Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        .navbar{
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:20px;
        }

        .login-container{
            width:400px;
            margin:60px auto;
        }

        .login-card{
            background:white;
            padding:35px;
            border-radius:12px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }

        .login-card h2{
            text-align:center;
            color:#0d6efd;
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#333;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:14px;
        }

        .btn{
            width:100%;
            background:#0d6efd;
            color:white;
            border:none;
            padding:12px;
            border-radius:6px;
            font-size:16px;
            cursor:pointer;
        }

        .btn:hover{
            background:#084298;
        }

        .register-link{
            text-align:center;
            margin-top:20px;
        }

        .register-link a{
            color:#0d6efd;
            text-decoration:none;
        }

        .register-link a:hover{
            text-decoration:underline;
        }

        .footer{
            margin-top:50px;
            background:#212529;
            color:white;
            text-align:center;
            padding:15px;
        }

    </style>

</head>

<body>

    <div class="navbar">
        <h1>JOBNEST</h1>
    </div>

    <div class="login-container">

        <div class="login-card">

            <h2>Employer Login</h2>

            <form method="POST">

                {% csrf_token %}

                <label>Email</label>

                <input
                    type="email"
                    name="email"
                    placeholder="Enter company email"
                    required
                >

                <label>Password</label>

                <input
                    type="password"
                    name="password"
                    placeholder="Enter password"
                    required
                >

                <button type="submit" class="btn">
                    Login
                </button>

            </form>

            <div class="register-link">

                <p>
                    New Employer?
                    <a href="/employer-register/">
                        Register Here
                    </a>
                </p>

            </div>

        </div>

    </div>

    <div class="footer">
        <p>JOBNEST - Connecting Employers with Talent</p>
    </div>

</body>
</html>
