<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Success | JOBNEST</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }

        .icon {
            font-size: 50px;
            margin-bottom: 10px;
        }

        h1 {
            margin: 10px 0;
            color: #2c3e50;
            font-size: 24px;
        }

        p {
            color: #555;
            font-size: 15px;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #1a242f;
        }
    </style>
</head>

<body>

<div class="card">
    <div class="icon">🎉</div>
    <h1>Registration Successful</h1>
    <p>Your account has been created successfully.</p>

    <a class="btn" href="/">Go Home</a>
</div>

</body>
</html>
