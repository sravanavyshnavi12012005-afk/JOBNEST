<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Posted | JOBNEST</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 420px;
            width: 90%;
        }

        .icon {
            font-size: 52px;
            margin-bottom: 10px;
        }

        h1 {
            margin: 10px 0;
            color: #2c3e50;
            font-size: 22px;
        }

        p {
            color: #555;
            font-size: 15px;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 10px 18px;
            margin: 5px;
            background: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s;
            font-size: 14px;
        }

        .btn:hover {
            background: #1a242f;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-secondary:hover {
            background: #565e64;
        }

        .button-group {
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="card">
    <div class="icon">🎉</div>
    <h1>Job Posted Successfully</h1>
    <p>Your job listing has been published and is now visible to job seekers.</p>

    <div class="button-group">
        <a class="btn" href="/employer-dashboard/">Go to Dashboard</a>
        <a class="btn btn-secondary" href="/post-job/">Post Another Job</a>
    </div>
</div>

</body>
</html>
