<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Jobs | JOBNEST</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f9;
            color: #333;
        }

        /* Header */
        .header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
        }

        /* Container */
        .container {
            width: 90%;
            max-width: 1000px;
            margin: 30px auto;
        }

        /* Job Card */
        .job-card {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s ease;
        }

        .job-card:hover {
            transform: translateY(-3px);
        }

        .job-title {
            margin: 0;
            font-size: 22px;
            color: #2c3e50;
        }

        .job-info {
            margin-top: 10px;
            font-size: 15px;
            color: #555;
        }

        .label {
            font-weight: bold;
            color: #222;
        }

        /* Empty state */
        .empty {
            text-align: center;
            padding: 40px;
            color: #777;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>All Posted Jobs</h1>
</div>

<div class="container">

    {% if jobs %}
        {% for job in jobs %}
            <div class="job-card">
                <h3 class="job-title">{{ job.title }}</h3>

                <div class="job-info">
                    <p><span class="label">Location:</span> {{ job.location }}</p>
                    <p><span class="label">Salary:</span> {{ job.salary }}</p>
                </div>
            </div>
        {% endfor %}
    {% else %}
        <div class="empty">
            <h3>No jobs available right now</h3>
            <p>Please check back later.</p>
        </div>
    {% endif %}

</div>

</body>
</html>
