<!DOCTYPE html>
<html>
<head>
    <title>JOBNEST - All Employers</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        .navbar{
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:20px;
        }

        .container{
            width:80%;
            margin:auto;
            margin-top:30px;
        }

        .page-title{
            text-align:center;
            margin-bottom:30px;
        }

        .page-title h2{
            color:#333;
        }

        .employer-card{
            background:white;
            padding:25px;
            margin-bottom:20px;
            border-radius:12px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }

        .employer-card h3{
            color:#0d6efd;
            margin-bottom:15px;
        }

        .employer-card p{
            margin-bottom:10px;
            color:#444;
            line-height:1.6;
        }

        .no-data{
            background:white;
            padding:25px;
            text-align:center;
            border-radius:12px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }

        .footer{
            margin-top:40px;
            background:#212529;
            color:white;
            text-align:center;
            padding:15px;
        }

    </style>

</head>

<body>

    <div class="navbar">
        <h1>JOBNEST</h1>
    </div>

    <div class="container">

        <div class="page-title">
            <h2>Registered Employers</h2>
        </div>

        {% if employers %}

            {% for employer in employers %}

                <div class="employer-card">

                    <h3>{{ employer.company_name }}</h3>

                    <p>
                        <strong>Email:</strong>
                        {{ employer.email }}
                    </p>

                    <p>
                        <strong>Phone:</strong>
                        {{ employer.phone }}
                    </p>

                </div>

            {% endfor %}

        {% else %}

            <div class="no-data">

                <h3>No employers found.</h3>

            </div>

        {% endif %}

    </div>

    <div class="footer">
        <p>JOBNEST - Admin Management Portal</p>
    </div>

</body>
</html>
